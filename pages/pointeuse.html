    <div class="container">
        <div class="welcome-header">
            <h1>Pointeuse</h1>
            <div class="info-badge">
                <i class="fas fa-star"></i>
                <span>Astuce : Mettez votre profil en favori pour une connexion automatique</span>
            </div>
        </div>

        <div id="employeeList"></div>
    </div>

    <!-- Modale de saisie de code avec clavier numerique -->
    <div id="codeModal" class="modal-pin">
        <div class="modal-content">
            <div class="modal-header">
                <div class="lock-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h3 class="modal-title" id="modalTitle">Code d'acces</h3>
                <p class="modal-subtitle">Entrez votre code PIN à 4 chiffres</p>
            </div>

            <div class="pin-display">
                <div class="pin-dot" data-index="0"></div>
                <div class="pin-dot" data-index="1"></div>
                <div class="pin-dot" data-index="2"></div>
                <div class="pin-dot" data-index="3"></div>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                Code incorrect
            </div>

            <div class="numeric-keyboard">
                <button class="num-key" data-num="1">1</button>
                <button class="num-key" data-num="2">2</button>
                <button class="num-key" data-num="3">3</button>
                <button class="num-key" data-num="4">4</button>
                <button class="num-key" data-num="5">5</button>
                <button class="num-key" data-num="6">6</button>
                <button class="num-key" data-num="7">7</button>
                <button class="num-key" data-num="8">8</button>
                <button class="num-key" data-num="9">9</button>
                <button class="num-key special" id="cancelKeyboard">
                    <i class="fas fa-times"></i>
                </button>
                <button class="num-key" data-num="0">0</button>
                <button class="num-key special" id="backspaceKey">
                    <i class="fas fa-backspace"></i>
                </button>
            </div>
        </div>
    </div>

    <footer class="app-footer">

    <script type="module" src="../js/announcements.js"></script>
    <script src="../js/sw-update.js"></script>
    <script>
               function toggleFab() {
    const fab     = document.getElementById('fabBtn');
    const dial    = document.getElementById('speedDial');
    const overlay = document.getElementById('sdOverlay');
    if (!fab || !dial || !overlay) return;
    const isOpen = dial.classList.toggle('open');
    fab.classList.toggle('open', isOpen);
    overlay.classList.toggle('open', isOpen);
  }
    </script>
